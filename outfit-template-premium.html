<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elegant Date Night Outfit Ideas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <a href="index.html" class="logo">Style By Alexandra / Home</a>
  </header>

  <section class="outfit-page-premium">
    <h1 class="outfit-title premium-title">Elegant Night Out Outfit</h1>

    <div class="premium-outfit-wrap">
      <div class="premium-main-block">
        <img src="outfits/outfit21.jpg" class="main-outfit premium-main-outfit" alt="Elegant night out outfit">

        <p class="outfit-description premium-description">
          A sleek black dress styled with chic accessories for an elegant evening look.
          Perfect for parties, date nights, and special events.
        </p>
      </div>

      <div class="products premium-products">
        <a class="product premium-product" href="https://amzn.to/4rt2mr6" target="_blank">
          <img src="products/dress.jpg" alt="Black dress">
          <p>View on Amazon</p>
        </a>

        <a class="product premium-product" href="https://amzn.to/4rjhuaf" target="_blank">
          <img src="products/bag.jpg" alt="Black bag">
          <p>View on Amazon</p>
        </a>

        <a class="product premium-product" href="https://amzn.to/40e2C1U" target="_blank">
          <img src="products/shoes.jpg" alt="Black heels">
          <p>View on Amazon</p>
        </a>

        <a class="product premium-product" href="https://amzn.to/4rmB5pT" target="_blank">
          <img src="products/earrings.jpg" alt="Gold earrings">
          <p>View on Amazon</p>
        </a>
      </div>
    </div>
  </section>

</body>
</html>
